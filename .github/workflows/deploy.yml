name: Deploy with SST

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions
      # DIRECT_DATABASE_URL はこの step にだけ渡す(他の step へ漏らさない)
      - name: Run DB migration
        run: npm run db:migrate
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      - name: Deploy SST app
        run: npm run deploy
        env:
          SST_SECRET_UmaOneDrawTopicDiscordWebhook: ${{ secrets.UMA_ONE_DRAW_TOPIC_DISCORD_WEBHOOK_URL }}
          SST_SECRET_AnimeAnalysisDiscordWebhook: ${{ secrets.ANIME_ANALYSIS_DISCORD_WEBHOOK_URL }}
          SST_SECRET_AlertDiscordWebhook: ${{ secrets.ALERT_DISCORD_WEBHOOK_URL }}
          SST_SECRET_DatabaseUrl: ${{ secrets.DATABASE_URL }}
          SST_SECRET_YacchoDiscordBotToken: ${{ secrets.YACCHO_DISCORD_BOT_TOKEN }}
          SST_SECRET_YacchoDiscordInteractionPublicKey: ${{ secrets.YACCHO_DISCORD_INTERACTION_PUBLIC_KEY }}
          SST_SECRET_YacchoDiscordApplicationId: ${{ secrets.YACCHO_DISCORD_APPLICATION_ID }}
          SST_SECRET_KaguyaDiscordBotToken: ${{ secrets.KAGUYA_DISCORD_BOT_TOKEN }}
          SST_SECRET_KaguyaDiscordInteractionPublicKey: ${{ secrets.KAGUYA_DISCORD_INTERACTION_PUBLIC_KEY }}
          SST_SECRET_KaguyaDiscordApplicationId: ${{ secrets.KAGUYA_DISCORD_APPLICATION_ID }}
      # deploy 済みのエンドポイントへ宣言済みスラッシュコマンドを bulk overwrite で同期する。
      # secret は develop stage の SST secret を sst shell 経由で参照する(build は deploy step 済み)
      - name: Sync Discord commands
        run: npx sst shell --stage develop --config infra/sst.config.ts -- npm run discord:sync:run
      # 一回限り: guild scope から global scope への移行で残る旧 Yaccho Bot guild command を削除する。
      # 初回デプロイの成功後にこの step を削除する。guild ID は旧 DISCORD_GUILD_ID secret を CLI 引数で渡す。
      - name: Clear old Yaccho guild commands (one-time)
        run: npx sst shell --stage develop --config infra/sst.config.ts -- node apps/batch-playground/dist/scripts/clear-yaccho-guild-commands.js "${{ secrets.DISCORD_GUILD_ID }}"
