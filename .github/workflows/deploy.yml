name: Deploy with SST

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check format
        run: npm run format
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  deploy:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions
      - name: Deploy SST app
        run: npm run deploy
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          UMA_ONE_DRAW_TOPIC_SCHEDULE: ${{ vars.UMA_ONE_DRAW_TOPIC_SCHEDULE }}
          UMA_ONE_DRAW_TOPIC_TIMEZONE: ${{ vars.UMA_ONE_DRAW_TOPIC_TIMEZONE }}
