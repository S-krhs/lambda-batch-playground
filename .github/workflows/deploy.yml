name: Deploy with SST

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions
      # DIRECT_DATABASE_URL はこの step にだけ渡す(他の step へ漏らさない)
      - name: Run DB migration
        run: npm run db:migrate
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      - name: Deploy SST app
        run: npm run deploy
        env:
          SST_SECRET_UmaOneDrawTopicDiscordWebhook: ${{ secrets.UMA_ONE_DRAW_TOPIC_DISCORD_WEBHOOK_URL }}
          SST_SECRET_AnimeAnalysisDiscordWebhook: ${{ secrets.ANIME_ANALYSIS_DISCORD_WEBHOOK_URL }}
          SST_SECRET_AlertDiscordWebhook: ${{ secrets.ALERT_DISCORD_WEBHOOK_URL }}
          SST_SECRET_DatabaseUrl: ${{ secrets.DATABASE_URL }}
          SST_SECRET_DiscordBotToken: ${{ secrets.DISCORD_BOT_TOKEN }}
          SST_SECRET_DiscordInteractionPublicKey: ${{ secrets.DISCORD_INTERACTION_PUBLIC_KEY }}
          SST_SECRET_DiscordApplicationId: ${{ secrets.DISCORD_APPLICATION_ID }}
          SST_SECRET_DiscordGuildId: ${{ secrets.DISCORD_GUILD_ID }}
          SST_SECRET_PlayCheckReminderDiscordChannelId: ${{ secrets.PLAY_CHECK_REMINDER_DISCORD_CHANNEL_ID }}
          SST_SECRET_PlayCheckReminderTargetUserId: ${{ secrets.PLAY_CHECK_REMINDER_TARGET_USER_ID }}
      # deploy 済みのエンドポイントへ宣言済みスラッシュコマンドを bulk overwrite で同期する。
      # secret は develop stage の SST secret を sst shell 経由で参照する(build は deploy step 済み)
      - name: Sync Discord commands
        run: npx sst shell --stage develop --config infra/sst.config.ts -- npm run discord:sync:run
