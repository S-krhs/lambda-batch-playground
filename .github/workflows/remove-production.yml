name: Remove production SST stage

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "delete production" to remove the production SST stage'
        required: true

jobs:
  remove-production:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$CONFIRM" != "delete production" ]; then
            echo 'Confirmation did not match. Type "delete production" to continue.'
            exit 1
          fi
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-remove-production
      - name: Apply removable production config
        run: npx sst deploy --stage production --print-logs
        env:
          ALLOW_PRODUCTION_REMOVE: "true"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          UMA_ONE_DRAW_TOPIC_SCHEDULE: ${{ vars.UMA_ONE_DRAW_TOPIC_SCHEDULE }}
          UMA_ONE_DRAW_TOPIC_TIMEZONE: ${{ vars.UMA_ONE_DRAW_TOPIC_TIMEZONE }}
      - name: Remove production SST stage
        run: npx sst remove --stage production --print-logs
        env:
          ALLOW_PRODUCTION_REMOVE: "true"
